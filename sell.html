<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Item - Campus Market</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-store"></i>
        Campus Market
    </div>

    <nav>

        <a href="index.html">
            <i class="fa-solid fa-house"></i> Home
        </a>

        <a href="marketplace.html">
            <i class="fa-solid fa-shop"></i> Marketplace
        </a>

        <a href="sell.html" class="active">
            <i class="fa-solid fa-plus"></i> Sell
        </a>

        <a href="profile.html">
            <i class="fa-solid fa-user"></i> Profile
        </a>

    </nav>

</header>

<section class="sell-container">

    <div class="sell-box">

        <h1>Sell Your Item</h1>

        <form id="sellForm">

            <input type="text" id="title" placeholder="Item Title" required>

            <input type="number" id="price" placeholder="Price (K)" required>

            <select id="category" required>
                <option value="">Select Category</option>
                <option>Books</option>
                <option>Electronics</option>
                <option>Clothing</option>
                <option>Phones</option>
                <option>Furniture</option>
                <option>Gaming</option>
            </select>

            <input type="text" id="image" placeholder="Image URL (for now)" required>

            <textarea id="description" placeholder="Item Description" rows="5" required></textarea>

            <button type="submit">Post Item</button>

        </form>

        <p id="msg"></p>

    </div>

</section>

<footer>
    <p>© 2026 Campus Market</p>
</footer>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Your JS -->
<script src="js/script.js"></script>

</body>
</html>
