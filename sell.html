<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Item - Campus Market</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-store"></i>
        Campus Market
    </div>

    <nav>

        <a href="index.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="marketplace.html">
            <i class="fa-solid fa-shop"></i>
            Marketplace
        </a>

        <a href="sell.html" class="active">
            <i class="fa-solid fa-plus"></i>
            Sell
        </a>
<a href="messages.html" class="nav-chat-link">
    <i class="fa-solid fa-comments"></i> Chats
    <!-- 🔴 The red dot will be injected here dynamically -->
    <span id="chatBadge" class="chat-badge" style="display: none;"></span>
</a>


        <a href="profile.html">
            <i class="fa-solid fa-user"></i>
            Profile
        </a>

    </nav>

</header>

<section class="sell-container">

    <div class="sell-box">

        <h1>Sell Your Item</h1>

        <form id="sellForm">

            <input
                type="text"
                id="title"
                placeholder="Item Title"
                required
            >

            <input
                type="number"
                id="price"
                placeholder="Price (K)"
                min="1"
                required
            >

            <select id="category" required>

                <option value="">Select Category</option>

                <option>Books</option>
                <option>Electronics</option>
                <option>Clothing</option>
                <option>Phones</option>
                <option>Furniture</option>
                <option>Gaming</option>

            </select>

            <label for="image">
                Product Image
            </label>

            <input
                type="file"
                id="image"
                accept="image/*"
                required
            >

            <input
                type="tel"
                id="contact"
                placeholder="WhatsApp Number (e.g. 0971234567)"
                required
            >

            <textarea
                id="description"
                rows="5"
                placeholder="Describe your item..."
                required
            ></textarea>

            <button type="submit">
                <i class="fa-solid fa-upload"></i>
                Post Item
            </button>

        </form>

        <p id="msg"></p>

    </div>

</section>

<footer>

    <p>
        © 2026 Campus Market. All Rights Reserved.
    </p>

    <p style="font-size:.75rem;color:#6b7280;margin-top:4px;">
        Engineered &amp; Maintained by
        <strong style="color:var(--accent-emerald);">
            EMMANUEL ELECTRONICS LTD.
        </strong>
    </p>

</footer>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Main JS -->
<script src="script.js"></script>

</body>
</html>
