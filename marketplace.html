<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Campus Market</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-store"></i>
        Campus Market
    </div>

    <nav>

        <a href="index.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="marketplace.html" class="active">
            <i class="fa-solid fa-shop"></i>
            Marketplace
        </a>

        <a href="sell.html">
            <i class="fa-solid fa-plus"></i>
            Sell
        </a>

        <a href="profile.html">
            <i class="fa-solid fa-user"></i>
            Profile
        </a>

    </nav>

</header>

<section class="hero">

    <h1>Marketplace</h1>

    <p>
        Browse all items being sold by students on campus.
    </p>

    <div class="search-box-container">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Search items..."
            >

            <button id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

        </div>

        <br>

        <select id="categoryFilter">

            <option value="">All Categories</option>

            <option>Books</option>
            <option>Electronics</option>
            <option>Clothing</option>
            <option>Phones</option>
            <option>Furniture</option>
            <option>Gaming</option>

        </select>

    </div>

</section>

<section class="products">

    <h2>All Listings</h2>

    <div class="product-grid" id="marketGrid">

        <p style="grid-column:1/-1;text-align:center;color:#888;">
            Loading listings...
        </p>

    </div>

</section>

<footer>

    <p>
        © 2026 Campus Market. All Rights Reserved.
    </p>

    <p style="font-size:.75rem;color:#6b7280;margin-top:4px;">
        Engineered &amp; Maintained by
        <strong style="color:var(--accent-emerald);">
            EMMANUEL ELECTRONICS LTD.
        </strong>
    </p>

</footer>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Main JavaScript -->
<script src="script.js"></script>

</body>
</html>
