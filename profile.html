<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Campus Market</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-store"></i>
        Campus Market
    </div>

    <nav>

        <a href="index.html">
            <i class="fa-solid fa-house"></i> Home
        </a>

        <a href="marketplace.html">
            <i class="fa-solid fa-shop"></i> Marketplace
        </a>

        <a href="sell.html">
            <i class="fa-solid fa-plus"></i> Sell
        </a>

        <a href="profile.html" class="active">
            <i class="fa-solid fa-user"></i> Profile
        </a>

    </nav>

</header>

<section class="profile-container">

    <div class="profile-box">

        <div class="profile-header">

            <div class="avatar">
                <i class="fa-solid fa-user"></i>
            </div>

            <div>
                <h2>Student Name</h2>
                <p>University of Zambia</p>
            </div>

        </div>

        <div class="profile-stats">

            <div>
                <h3>5</h3>
                <p>Listings</p>
            </div>

            <div>
                <h3>12</h3>
                <p>Sales</p>
            </div>

            <div>
                <h3>4.8</h3>
                <p>Rating</p>
            </div>

        </div>

        <button class="logout-btn">
            Logout
        </button>

    </div>

</section>

<section class="products">

    <h2>My Listings</h2>

    <div class="product-grid">

        <div class="card">
            <img src="https://picsum.photos/300/200?21">
            <h3>Old Laptop</h3>
            <p class="price">K2,000</p>
            <p class="location">UNZA</p>
            <button>View</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?22">
            <h3>Math Notes</h3>
            <p class="price">K80</p>
            <p class="location">CBU</p>
            <button>View</button>
        </div>

    </div>

</section>

<footer>
    <p>© 2026 Campus Market</p>
</footer>

</body>
</html>
