<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Campus Market</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>
    <div class="logo">
        <i class="fa-solid fa-store"></i>
        Campus Market
    </div>

    <nav>
        <a href="index.html">
            <i class="fa-solid fa-house"></i> Home
        </a>
        <a href="marketplace.html">
            <i class="fa-solid fa-shop"></i> Marketplace
        </a>
        <a href="sell.html">
            <i class="fa-solid fa-plus"></i> Sell
        </a>
        <a href="messages.html" class="nav-chat-link">
    <i class="fa-solid fa-comments"></i> Chats
    <!-- 🔴 The red dot will be injected here dynamically -->
    <span id="chatBadge" class="chat-badge" style="display: none;"></span>
</a>


        <a href="profile.html" class="active">
            <i class="fa-solid fa-user"></i> Profile
        </a>
    </nav>
</header>

<section class="profile-container">
    <div class="profile-box">
        <div class="profile-header">
            <div class="avatar"
                 onclick="document.getElementById('avatarInput').click()"
                 style="cursor:pointer;position:relative;overflow:hidden;">
                <i class="fa-solid fa-user" id="defaultAvatarIcon"></i>
                <img
                    id="profileDisplayImg"
                    src=""
                    alt="Profile Picture"
                    style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;"
                >
            </div>

            <input
                type="file"
                id="avatarInput"
                accept="image/*"
                style="display:none;"
            >

            <div>
                <h2 id="userEmail">Loading...</h2>
                <div id="userRoleBadge" style="margin-top: 6px; display: flex; flex-direction: column; gap: 4px;">
                    <p style="margin: 0; font-size: 0.9rem; color: #666;">University of Zambia</p>
                </div>
            </div>
        </div>

        <div class="profile-stats">
            <div>
                <h3 id="listingsCount">-</h3>
                <p>Listings</p>
            </div>
            <div>
                <h3>-</h3>
                <p>Sales</p>
            </div>
            <div>
                <h3>-</h3>
                <p>Rating</p>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </button>
    </div>
</section>

<section class="products">
    <h2>My Listings</h2>
    <p id="profileMsg" style="text-align:center;margin-bottom:15px;font-weight:500;"></p>
    <div class="product-grid" id="myItemsGrid">
        <p style="grid-column:1/-1;text-align:center;color:#888;">
            Loading your listings...
        </p>
    </div>
</section>

<section class="products" style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 40px;">
    <h2>Saved Items 🤍</h2>
    <div class="product-grid" id="savedGrid">
        <p style="grid-column:1/-1;text-align:center;color:#888;">
            Loading your saved items...
        </p>
    </div>
</section>

<footer>
    <p>© 2026 Campus Market. All Rights Reserved.</p>
    <p style="font-size:.75rem;color:#6b7280;margin-top:4px;">
        Engineered &amp; Maintained by
        <strong style="color:var(--accent-emerald);">
            EMMANUEL ELECTRONICS LTD.
        </strong>
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>

</body>
</html>
