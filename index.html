<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Campus Market</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>
    <div class="logo">
        <i class="fa-solid fa-store"></i> Campus Market
    </div>
</header>

<section class="auth-container">
    <div class="auth-box">
        <h2>Create Account</h2>

        <!-- Prevent default form reload and hook up your JS logic -->
        <form onsubmit="event.preventDefault(); signup();">
            <input type="text" id="username" placeholder="Full Name" required>
            
            <!-- Added id="email" so your js script can read the value -->
            <input type="email" id="email" placeholder="University Email" required>

            <!-- Added id="password" so your js script can read the value -->
            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">
                <i class="fa-solid fa-user-plus"></i> Sign Up
            </button>
        </form>

        <p id="msg" style="margin-top: 15px; font-weight: 500;"></p>

        <p style="margin-top: 15px; font-size: 0.9rem; color: var(--text-secondary);">
            Already have an account? 
            <a href="login.html" style="color: var(--accent-emerald); text-decoration: none; font-weight: 600;">Login</a>
        </p>
    </div>
</section>

<footer>
    <p>© 2026 Campus Market. All Rights Reserved.</p>
    <p style="font-size: 0.75rem; color: #6b7280; margin-top: 4px; letter-spacing: 0.5px;">
        Engineered & Maintained by <strong style="color: var(--accent-emerald);">EMMANUEL ELECTRONICS LTD.</strong>
    </p>
</footer>

<!-- Pull in Supabase & your local script layer to execute the registration pipeline -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/script.js"></script>

</body>
</html>
