<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-emerald: #10b981;
            --border-color: #334155;
            --text-danger: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
        header { background-color: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        header .logo { font-size: 1.4rem; font-weight: 700; color: var(--accent-emerald); display: flex; align-items: center; gap: 10px; text-decoration: none; }
        nav { display: flex; gap: 20px; }
        nav a { color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; }
        nav a:hover { color: var(--text-primary); background-color: var(--border-color); }
        .auth-section { flex: 1; display: flex; justify-content: center; align-items: center; padding: 3rem 1rem; }
        .auth-box { background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 2.5rem; border-radius: 12px; width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; }
        .auth-box h1 { font-size: 1.8rem; font-weight: 700; text-align: center; }
        .auth-box p { color: var(--text-secondary); font-size: 0.95rem; text-align: center; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; background: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 6px; outline: none; font-size: 0.95rem; }
        input:focus { border-color: var(--accent-emerald); }
        button { width: 100%; border: none; padding: 12px; border-radius: 6px; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: background 0.2s; }
        button:nth-of-type(1) { background: var(--accent-emerald); color: white; }
        button:nth-of-type(1):hover { background: #059669; }
        button:nth-of-type(2) { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }
        button:nth-of-type(2):hover { background: var(--border-color); color: var(--text-primary); }
        #msg { text-align: center; font-size: 0.9rem; font-weight: 500; min-height: 20px; margin-top: 5px; }
        footer { background-color: var(--bg-secondary); border-top: 1px solid var(--border-color); padding: 1.5rem 5%; text-align: center; font-size: 0.9rem; color: var(--text-secondary); }
        @media (max-width: 600px) { header { flex-direction: column; gap: 15px; padding: 1rem; } nav { width: 100%; justify-content: space-around; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo"><i class="fa-solid fa-store"></i> Campus Market</a>
    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="marketplace.html"><i class="fa-solid fa-shop"></i> Marketplace</a>
        <a href="sell.html"><i class="fa-solid fa-plus"></i> Sell</a>
        <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
    </nav>
</header>

<section class="auth-section">
    <div class="auth-box">
        <h1>Welcome Back</h1>
        <p>Login or create an account to continue.</p>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
        <button onclick="signup()"><i class="fa-solid fa-user-plus"></i> Create Account</button>
        <p id="msg"></p>
    </div>
</section>

<footer>
    <p>© 2026 Campus Market. Engineered by EMMANUEL ELECTRONICS LTD.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
